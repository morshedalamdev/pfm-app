services:
  - type: web
    name: pfm-api
    runtime: docker
    plan: free
    region: singapore
    branch: main
    dockerContext: ./server
    dockerfilePath: ./server/Dockerfile
    healthCheckPath: /api/v1/health/ready
    autoDeployTrigger: checksPass
    envVars:
      - key: APP_NAME
        value: PFM API
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: CORS_ORIGINS
        value: '["https://pfm.morshedalam.dev"]'
      - key: DATABASE_URL
        sync: false
      - key: MIGRATION_DATABASE_URL
        sync: false
      - key: DATABASE_ECHO
        value: "false"
      - key: DATABASE_POOL_SIZE
        value: "5"
      - key: DATABASE_MAX_OVERFLOW
        value: "5"
      - key: ACCESS_TOKEN_SECRET_KEY
        generateValue: true
      - key: REFRESH_TOKEN_SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: RUN_MIGRATIONS
        value: "true"
      - key: STORAGE_BACKEND
        value: local
      - key: LOCAL_STORAGE_ROOT
        value: /tmp/pfm-storage
      - key: EMAIL_BACKEND
        value: console
      - key: EMAIL_FROM_ADDRESS
        value: no-reply@pfm.morshedalam.dev
